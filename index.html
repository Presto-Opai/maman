// ============================================================
//  WILDLIFE  (animated, drawn above ground decorations)
// ============================================================
function drawWildlife() {
  const t = Date.now();
  for (const d of allDecorations) {
    if (d.type !== 'butterfly' && d.type !== 'seagull' && d.type !== 'swallow') continue;
    const bx = d.x - camX, by = d.y - camY;
    if (bx < -60 || bx > DW + 60 || by < -60 || by > DH + 60) continue;
    if (d.type === 'butterfly') {
      const tt = t * 0.005 + d.x;
      const x = bx + Math.sin(tt) * 18, y = by + Math.cos(tt * 0.7) * 10;
      const spread = 0.4 + 0.6 * Math.abs(Math.sin(t * 0.012 + d.x));
      const pal = ['#e86aa0','#f0a83a','#6aa8f0','#f0e24a'];
      const c = pal[Math.floor((d.x*3+d.y))%pal.length];
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.ellipse(x-4, y, 4.5, 4*spread, -0.4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x+4, y, 4.5, 4*spread, 0.4, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#2a2a2a'; ctx.fillRect(x-0.6, y-3, 1.2, 6);
    } else {
      // seagull / swallow gliding arc
      const tt = t * 0.003 + d.x * 0.1;
      const x = bx + Math.sin(tt) * 34, y = by + Math.cos(tt * 0.5) * 12;
      const flap = Math.sin(t * 0.016 + d.x) * 4;
      ctx.strokeStyle = d.type === 'seagull' ? 'rgba(250,250,255,0.95)' : 'rgba(40,40,55,0.9)';
      ctx.lineWidth = 2; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(x-9, y+flap); ctx.quadraticCurveTo(x-3, y-4, x, y); ctx.quadraticCurveTo(x+3, y-4, x+9, y+flap);
      ctx.stroke();
    }
  }
  // high-altitude migrating birds (a few per region, procedural)
  ctx.strokeStyle = 'rgba(60,60,80,0.5)'; ctx.lineWidth = 1.6;
  for (let i = 0; i < 5; i++) {
    const span = WORLD_W + 400;
    const wx = ((i * 950 + t * 0.03) % span) - 200;
    const wy = 80 + (i * 137) % 240 + ((Math.floor((i*950 + t*0.03)/span)) % 2) * 600;
    const x = wx - camX, y = wy - camY;
    if (x < -30 || x > DW + 30 || y < -30 || y > DH + 30) continue;
    const flap = Math.sin(t * 0.01 + i) * 3;
    ctx.beginPath();
    ctx.moveTo(x-7, y+flap); ctx.quadraticCurveTo(x-2, y-3, x, y); ctx.quadraticCurveTo(x+2, y-3, x+7, y+flap);
    ctx.stroke();
  }
}

// ============================================================
//  AMBIENT FOLK  (non-interactive villagers for life)
// ============================================================
let ambientFolk = [];
function buildAmbientFolk() {
  ambientFolk = [];
  const palettes = ['#d98a8a','#8aa8d9','#9ed98a','#d9c98a','#c98ad9','#8ad9c9'];
  let s = 7;
  const rnd = () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
  for (const key of Object.keys(REGIONS)) {
    const o = regionOrigin(key);
    const n = 5;
    for (let i = 0; i < n; i++) {
      ambientFolk.push({
        bx: o.x + 150 + rnd() * (REGION_W - 300),
        by: o.y + 150 + rnd() * (REGION_H - 350),
        color: palettes[Math.floor(rnd() * palettes.length)],
        ph: rnd() * Math.PI * 2,
        range: 20 + rnd() * 40,
        spd: 0.3 + rnd() * 0.5,
      });
    }
  }
}
function drawAmbientFolk() {
  const t = Date.now();
  for (const f of ambientFolk) {
    const wx = f.bx + Math.sin(t * 0.0004 * f.spd + f.ph) * f.range;
    const wy = f.by + Math.cos(t * 0.0003 * f.spd + f.ph) * f.range * 0.5;
    const sx = wx - camX, sy = wy - camY;
    if (sx < -30 || sx > DW + 30 || sy < -30 || sy > DH + 30) continue;
    const bob = Math.sin(t * 0.006 + f.ph) * 1.5;
    drawLittlePerson(sx, sy + bob, f.color, 0.8);
  }
}

// A simple storybook person: shadow, gumdrop body, head, hair
function drawLittlePerson(sx, sy, color, scale) {
  softShadow(sx, sy + 11*scale, 9*scale, 3*scale, 0.20);
  // body
  ctx.fillStyle = lin(sx-8*scale, sy, sx+8*scale, sy+12*scale, lighten(color,0.12), darken(color,0.14));
  ctx.beginPath();
  ctx.moveTo(sx-7*scale, sy+12*scale);
  ctx.quadraticCurveTo(sx-8*scale, sy-2*scale, sx, sy-3*scale);
  ctx.quadraticCurveTo(sx+8*scale, sy-2*scale, sx+7*scale, sy+12*scale);
  ctx.closePath(); ctx.fill();
  // head
  ctx.fillStyle = '#f0c8a0'; ctx.beginPath(); ctx.arc(sx, sy-6*scale, 5*scale, 0, Math.PI*2); ctx.fill();
  // hair
  ctx.fillStyle = '#5a3a1a'; ctx.beginPath(); ctx.arc(sx, sy-8*scale, 5*scale, Math.PI, 2*Math.PI); ctx.fill();
}

// ============================================================
//  ITEMS
// ============================================================
function drawItems() {
  const t = Date.now();
  for (const item of items) {
    if (item.picked) continue;
    const sx = item.x - camX, sy = item.y - camY;
    if (sx < -40 || sx > DW + 40 || sy < -40 || sy > DH + 40) continue;
    const floatY = Math.sin(t * 0.003 + item.x) * 5;
    const pulse = 17 + Math.sin(t * 0.005 + item.x) * 4;
    const g = ctx.createRadialGradient(sx, sy + floatY - 6, 0, sx, sy + floatY - 6, pulse);
    g.addColorStop(0, 'rgba(255,228,130,0.6)');
    g.addColorStop(0.5, 'rgba(255,210,90,0.22)');
    g.addColorStop(1, 'rgba(255,210,90,0)');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(sx, sy + floatY - 6, pulse, 0, Math.PI*2); ctx.fill();
    // sparkles
    for (let i = 0; i < 3; i++) {
      const a = t * 0.004 + i * 2.1;
      const r = 14;
      ctx.fillStyle = 'rgba(255,245,200,' + (0.4 + 0.4*Math.sin(t*0.006+i)) + ')';
      ctx.fillRect(sx + Math.cos(a)*r - 1, sy + floatY - 6 + Math.sin(a)*r - 1, 2, 2);
    }
    softShadow(sx, sy + 14, 9, 3, 0.18);
    ctx.font = '28px serif'; ctx.textAlign = 'center';
    ctx.fillText(item.emoji, sx, sy + floatY);
    ctx.textAlign = 'left';
  }
}

// ============================================================
//  NPCs & PLAYER
// ============================================================
function drawCharacterBody(sx, sy, color, radius) {
  // gumdrop body with radial shading
  ctx.fillStyle = radial(sx - radius*0.3, sy - radius*0.3, radius*1.3, lighten(color, 0.22), darken(color, 0.18));
  ctx.beginPath();
  ctx.moveTo(sx - radius*0.85, sy + radius*0.7);
  ctx.quadraticCurveTo(sx - radius*1.05, sy - radius*0.6, sx, sy - radius*0.9);
  ctx.quadraticCurveTo(sx + radius*1.05, sy - radius*0.6, sx + radius*0.85, sy + radius*0.7);
  ctx.quadraticCurveTo(sx, sy + radius*1.0, sx - radius*0.85, sy + radius*0.7);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.18)'; ctx.lineWidth = 1.5; ctx.stroke();
  // rim light
  ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(sx, sy - radius*0.1, radius*0.95, Math.PI*1.1, Math.PI*1.6); ctx.stroke();
}

function drawNPCs() {
  const t = Date.now();
  for (const npc of npcs) {
    const sx = npc.x - camX, sy = npc.y - camY;
    if (sx < -50 || sx > DW + 50 || sy < -50 || sy > DH + 50) continue;
    const bob = endSequenceActive ? 0 : Math.sin(t * 0.004 + npc.x) * 1.2;
    softShadow(sx, sy + 17, 14, 5, 0.24);
    drawCharacterBody(sx, sy + bob, npc.color, 15);
    ctx.font = '18px serif'; ctx.textAlign = 'center';
    ctx.fillText(npc.emoji, sx, sy + 6 + bob);
    if (npc.hasCandle) {
      const fl = 10 + Math.sin(t * 0.012 + sx) * 2.5;
      const g = ctx.createRadialGradient(sx + 16, sy - 13, 0, sx + 16, sy - 13, fl);
      g.addColorStop(0, 'rgba(255,220,120,0.7)'); g.addColorStop(1, 'rgba(255,220,120,0)');
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(sx + 16, sy - 13, fl, 0, Math.PI*2); ctx.fill();
      ctx.font = '14px serif'; ctx.fillText('🕯️', sx + 16, sy - 9);
    }
    // name pill
    drawNamePlate(sx, sy - 26, npc.name, '#ffe9b0');
    ctx.textAlign = 'left';
  }
}

function drawNamePlate(x, y, text, color) {
  ctx.font = 'bold 11px Georgia';
  const w = ctx.measureText(text).width + 12;
  ctx.fillStyle = 'rgba(20,16,34,0.5)';
  roundRectPath(x - w/2, y - 8, w, 15, 7); ctx.fill();
  ctx.fillStyle = color; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y);
  ctx.textBaseline = 'alphabetic';
}

function drawPlayer() {
  const t = Date.now();
  const moving = gameState.targetX !== null;
  const sx = gameState.playerX - camX;
  const sy = gameState.playerY - camY;
  const bob = moving ? Math.abs(Math.sin(t * 0.012)) * 2.5 : Math.sin(t * 0.004) * 1.2;
  const py = sy - bob;

  softShadow(sx, sy + 18, 16, 6, 0.3);
  // aura
  const aura = ctx.createRadialGradient(sx, py, 8, sx, py, 28);
  aura.addColorStop(0, 'rgba(245,200,66,0.30)'); aura.addColorStop(1, 'rgba(245,200,66,0)');
  ctx.fillStyle = aura; ctx.beginPath(); ctx.arc(sx, py, 28, 0, Math.PI*2); ctx.fill();

  // body
  ctx.fillStyle = radial(sx-6, py-6, 20, '#ffe79a', '#d9a826');
  ctx.beginPath(); ctx.arc(sx, py, 16, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#c9a020'; ctx.lineWidth = 2; ctx.stroke();
  // hair
  ctx.fillStyle = '#46280a'; ctx.beginPath(); ctx.arc(sx, py - 6, 14, Math.PI, 2*Math.PI); ctx.fill();
  ctx.fillRect(sx - 14, py - 6, 5, 18); ctx.fillRect(sx + 9, py - 6, 5, 18);
  // face
  ctx.fillStyle = '#f3cca2'; ctx.beginPath(); ctx.arc(sx, py + 2, 10, 0, Math.PI*2); ctx.fill();
  // blush
  ctx.fillStyle = 'rgba(240,140,120,0.45)';
  ctx.beginPath(); ctx.arc(sx-6, py+4, 2.4, 0, Math.PI*2); ctx.arc(sx+6, py+4, 2.4, 0, Math.PI*2); ctx.fill();
  // eyes
  ctx.fillStyle = '#3a2010'; ctx.beginPath(); ctx.arc(sx-4, py, 1.7, 0, Math.PI*2); ctx.arc(sx+4, py, 1.7, 0, Math.PI*2); ctx.fill();
  // smile
  ctx.strokeStyle = '#b85838'; ctx.lineWidth = 1.6; ctx.beginPath(); ctx.arc(sx, py+3, 4, 0.12*Math.PI, 0.88*Math.PI); ctx.stroke();

  drawNamePlate(sx, py - 26, 'Ana Lucila', '#ffe07a');

  if (moving) {
    const tx = gameState.targetX - camX, ty = gameState.targetY - camY;
    ctx.strokeStyle = 'rgba(245,200,66,0.6)'; ctx.lineWidth = 2;
    const rr = 6 + Math.sin(t * 0.008) * 3;
    ctx.beginPath(); ctx.arc(tx, ty, rr, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = 'rgba(245,200,66,0.25)'; ctx.beginPath(); ctx.arc(tx, ty, rr*0.6, 0, Math.PI*2); ctx.fill();
  }
  ctx.textAlign = 'left';
}

// ============================================================
//  END SEQUENCE CAKE + CELEBRATION
// ============================================================
function drawEndSequenceCake() {
  if (!endSequenceActive) return;
  const vo = regionOrigin('velizy');
  const cx = vo.x + 350 - camX, cy = vo.y + 750 - camY;
  // glow
  const g = ctx.createRadialGradient(cx, cy, 10, cx, cy, 120);
  g.addColorStop(0, 'rgba(255,220,120,0.4)'); g.addColorStop(1, 'rgba(255,220,120,0)');
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, 120, 0, Math.PI*2); ctx.fill();
  ctx.font = '64px serif'; ctx.textAlign = 'center'; ctx.fillText('🎂', cx, cy + 22);
  for (let i = 0; i < 8; i++) {
    const a = (i/8)*Math.PI*2 + Date.now()*0.002;
    ctx.font = '20px serif'; ctx.fillText('🕯️', cx + Math.cos(a)*52, cy + Math.sin(a)*52);
  }
  // confetti
  for (let i = 0; i < 46; i++) {
    const tt = Date.now() * 0.001 + i * 100;
    const cxx = cx + Math.sin(tt + i) * (90 + i * 3);
    const cyy = cy - 90 + Math.cos(tt * 0.5 + i) * 50 + (endSequenceTimer * 0.6) % 130;
    ctx.save(); ctx.translate(cxx, cyy); ctx.rotate(tt);
    ctx.fillStyle = ['#f5c842','#e07050','#70b0e0','#a070c0','#4a9e4a','#e860a0'][i % 6];
    ctx.fillRect(-3, -3, 6, 6); ctx.restore();
  }
  ctx.textAlign = 'left';
}

// ============================================================
//  TELEPHERIQUE BUTTON
// ============================================================
function drawTelePheriqueButton() {
  if (getCurrentRegion(gameState.playerX, gameState.playerY) !== 'grenoble') return;
  const sx = TELEPHERIQUE.bottomX - camX, sy = TELEPHERIQUE.bottomY - camY;
  const pulse = 1 + Math.sin(Date.now()*0.004)*0.06;
  softShadow(sx, sy + 16, 16, 5, 0.2);
  ctx.save(); ctx.translate(sx, sy); ctx.scale(pulse, pulse);
  const g = ctx.createRadialGradient(-4, -16, 2, 0, -8, 20);
  g.addColorStop(0, 'rgba(255,240,200,0.9)'); g.addColorStop(1, 'rgba(255,240,200,0)');
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0, -8, 20, 0, Math.PI*2); ctx.fill();
  ctx.font = '30px serif'; ctx.textAlign = 'center'; ctx.fillText('🚠', 0, 4);
  ctx.restore();
  drawNamePlate(sx, sy + 30, 'Téléphérique', '#fff0a0');
  ctx.textAlign = 'left';
}

// ============================================================
//  WEATHER + LIGHT  (post-process)
// ============================================================
const weatherParticles = [];
function initWeather() {
  weatherParticles.length = 0;
  for (let i = 0; i < 80; i++) {
    weatherParticles.push({ x: Math.random()*DW, y: Math.random()*DH, r: 0.7+Math.random()*2.0, ph: Math.random()*Math.PI*2, sp: 0.5+Math.random()*1.6 });
  }
}
initWeather();

function drawWeatherAndLight() {
  const region = gameState ? getCurrentRegion(gameState.playerX, gameState.playerY) : 'velizy';
  const t = Date.now();
  // slow day light cycle (0=matin doré, .5=midi clair, 1=après-midi doré)
  const day = (Math.sin(t * 0.00003) + 1) / 2; // 0..1 smooth
  const warmth = 0.06 + 0.10 * (1 - Math.abs(day - 0.5) * 2); // stronger at golden hours? invert
  const golden = Math.abs(day - 0.5) * 2; // 0 midday .. 1 golden

  // directional sun wash
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const sunX = DW * (0.2 + day * 0.6), sunY = DH * 0.08;
  const sun = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, Math.max(DW, DH));
  let base = `rgba(255,${Math.round(225 - golden*40)},${Math.round(170 - golden*70)},${(0.08 + golden*0.07).toFixed(3)})`;
  if (region === 'acapulco') base = `rgba(255,210,120,${(0.13 + golden*0.06).toFixed(3)})`;
  else if (region === 'paris') base = `rgba(220,225,255,0.07)`;
  else if (region === 'grenoble') base = `rgba(225,240,255,0.10)`;
  sun.addColorStop(0, base); sun.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = sun; ctx.fillRect(0, 0, DW, DH);
  ctx.restore();

  // golden-hour colour grade
  if (golden > 0.05) {
    ctx.save(); ctx.globalCompositeOperation = 'soft-light';
    ctx.fillStyle = `rgba(255,180,90,${(golden*0.18).toFixed(3)})`;
    ctx.fillRect(0, 0, DW, DH); ctx.restore();
  }

  // weather particles
  const snow = region === 'grenoble';
  const sea = region === 'acapulco';
  for (const p of weatherParticles) {
    if (snow) {
      p.y += 0.5 + p.sp*0.5; p.x += Math.sin(t*0.001 + p.ph)*0.6;
      if (p.y > DH + 5) { p.y = -5; p.x = Math.random()*DW; }
    } else {
      p.y -= 0.10 + p.sp*0.12; p.x += Math.sin(t*0.0006 + p.ph)*0.5;
      if (p.y < -5) { p.y = DH + 5; p.x = Math.random()*DW; }
    }
    if (p.x < -5) p.x = DW+5; else if (p.x > DW+5) p.x = -5;
    const tw = 0.35 + 0.4*(0.5+0.5*Math.sin(t*0.004 + p.ph));
    const col = snow ? `rgba(255,255,255,${tw})` : (sea ? `rgba(255,250,225,${tw})` : `rgba(255,242,200,${tw*0.85})`);
    const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r*2.2);
    g.addColorStop(0, col); g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(p.x, p.y, p.r*2.2, 0, Math.PI*2); ctx.fill();
  }

  // cinematic vignette
  const vg = ctx.createRadialGradient(DW/2, DH/2, Math.min(DW,DH)*0.38, DW/2, DH/2, Math.max(DW,DH)*0.78);
  vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(10,8,22,0.42)');
  ctx.fillStyle = vg; ctx.fillRect(0, 0, DW, DH);
}

// ============================================================
//  MINI-MAP
// ============================================================
const minimapCanvas = document.getElementById('minimap-canvas');
const mctx = minimapCanvas.getContext('2d');
const MM_W = 160, MM_H = 106;
const MM_SCALE_X = MM_W / WORLD_W;
const MM_SCALE_Y = MM_H / WORLD_H;
function drawMinimap() {
  mctx.clearRect(0, 0, MM_W, MM_H);
  for (const [key, r] of Object.entries(REGIONS)) {
    const rx = r.col*REGION_W*MM_SCALE_X, ry = r.row*REGION_H*MM_SCALE_Y;
    const rw = REGION_W*MM_SCALE_X, rh = REGION_H*MM_SCALE_Y;
    const th = THEME[key];
    const g = mctx.createLinearGradient(rx, ry, rx, ry+rh);
    g.addColorStop(0, th.gTop); g.addColorStop(1, th.gBot);
    mctx.fillStyle = g; mctx.fillRect(rx, ry, rw, rh);
    mctx.strokeStyle = 'rgba(255,255,255,0.3)'; mctx.lineWidth = 0.5; mctx.strokeRect(rx, ry, rw, rh);
    mctx.fillStyle = 'rgba(255,255,255,0.75)'; mctx.font = '6px Georgia'; mctx.textAlign = 'center';
    mctx.fillText(r.name, rx+rw/2, ry+rh/2+2);
  }
  for (const npc of npcs) {
    if (!npc.hasCandle) continue;
    mctx.fillStyle = '#f5c842';
    mctx.beginPath(); mctx.arc(npc.x*MM_SCALE_X, npc.y*MM_SCALE_Y, 2, 0, Math.PI*2); mctx.fill();
  }
  // player with pulse
  const px = gameState.playerX*MM_SCALE_X, py = gameState.playerY*MM_SCALE_Y;
  mctx.fillStyle = 'rgba(255,80,80,0.4)';
  mctx.beginPath(); mctx.arc(px, py, 4 + Math.sin(Date.now()*0.005)*1.5, 0, Math.PI*2); mctx.fill();
  mctx.fillStyle = '#ff4444'; mctx.beginPath(); mctx.arc(px, py, 3, 0, Math.PI*2); mctx.fill();
  mctx.strokeStyle = '#fff'; mctx.lineWidth = 1; mctx.stroke();
  mctx.textAlign = 'left';
}

// ============================================================
//  MAIN RENDER
// ============================================================
function render() {
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.clearRect(0, 0, DW, DH);
  drawSkyAndGround();
  drawAmbientShadows();
  drawDecorations();
  drawBuildings();
  drawMaze();
  drawAmbientFolk();
  drawWildlife();
  drawItems();
  drawTelePheriqueButton();
  drawNPCs();
  drawPlayer();
  drawEndSequenceCake();
  drawWeatherAndLight();
  drawMinimap();
}

// ---- Game Loop ----
let running = false;

function gameLoop() {
  if (!running) return;
  update();
  render();
  updateHUD();
  requestAnimationFrame(gameLoop);
}

// ---- Start Game ----
function startGame(isNew) {
  buildWorld();
  initMazeDecos();
  buildAmbientFolk();
  initWeather();
  npcs = createNPCs();
  items = createItems();

  if (isNew) {
    gameState = newGameState();
  } else {
    gameState = newGameState(); // default
    loadGame(); // overwrite with saved
  }

  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  document.getElementById('minimap').style.display = 'block';
  updateCamera();
  updateHUD();
  running = true;

  if (isNew) {
    setTimeout(() => {
      showDialogue('Gérard', 'Joyeux anniversaire ! Tu as parlé à tout le monde ? Va voir les personnages avec une bougie dans chaque région !');
    }, 300);
  }

  gameLoop();
}

// ---- UI Events ----
document.getElementById('btn-new').addEventListener('click', () => {
  localStorage.removeItem('elViaje_save');
  startGame(true);
});

document.getElementById('btn-continue').addEventListener('click', () => {
  startGame(false);
});

document.getElementById('btn-restart').addEventListener('click', () => {
  document.getElementById('end-screen').style.display = 'none';
  localStorage.removeItem('elViaje_save');
  running = false;
  endSequenceActive = false;
  dialogueQueue = [];
  dialogueActive = false;
  document.getElementById('dialogue-box').style.display = 'none';
  document.getElementById('start-screen').style.display = 'flex';
  checkContinueButton();
});

function checkContinueButton() {
  document.getElementById('btn-continue').disabled = !hasSave();
}
checkContinueButton();
</script>
