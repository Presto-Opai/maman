      ctx.restore(); break;
    }
    case 'shell': {
      ctx.fillStyle = lin(sx-4,sy-3,sx+4,sy+3,'#fff0dc','#e8c79e');
      ctx.beginPath(); ctx.ellipse(sx, sy, 4.5, 3.5, 0.4, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = 'rgba(180,140,100,0.7)'; ctx.lineWidth = 0.6;
      for (let i = -1; i <= 1; i++) { ctx.beginPath(); ctx.moveTo(sx, sy+1); ctx.lineTo(sx+i*3, sy-3); ctx.stroke(); }
      break;
    }
    case 'snow': {
      ctx.fillStyle = radial(sx, sy, 18, 'rgba(255,255,255,0.85)', 'rgba(225,238,255,0.3)');
      ctx.beginPath(); ctx.ellipse(sx, sy, 18, 9, 0.15, 0, Math.PI*2); ctx.fill();
      break;
    }
    case 'mailbox': {
      softShadow(sx, sy+5, 6, 2, 0.16);
      ctx.fillStyle = '#3a3a3a'; ctx.fillRect(sx-1.5, sy, 3, 10);
      ctx.fillStyle = lin(sx-5,sy-9,sx+5,sy-1,'#e0c84a','#c0a020'); roundRectPath(sx-5, sy-9, 10, 9, 3); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.fillRect(sx-3, sy-7, 6, 1.5);
      break;
    }
    case 'bike': {
      ctx.strokeStyle = '#3a3a3a'; ctx.lineWidth = 1.6;
      ctx.beginPath(); ctx.arc(sx-6, sy+2, 5, 0, Math.PI*2); ctx.moveTo(sx+11, sy+2); ctx.arc(sx+6, sy+2, 5, 0, Math.PI*2); ctx.stroke();
      ctx.strokeStyle = '#c04040'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(sx-6,sy+2); ctx.lineTo(sx, sy-5); ctx.lineTo(sx+6,sy+2); ctx.moveTo(sx,sy-5); ctx.lineTo(sx+3,sy-8); ctx.stroke();
      break;
    }
    default: break;
  }
  ctx.textAlign = 'left';
}

// ============================================================
//  WILDLIFE (flying — always above the world)
// ============================================================
function drawWildlife(t) {
  for (const d of allDecorations) {
    if (!FLYING_DECOS.has(d.type)) continue;
    const bx = d.x - camX, by = d.y - camY;
    if (bx < -60 || bx > DW + 60 || by < -60 || by > DH + 60) continue;
    if (d.type === 'butterfly') {
      const tt = t * 0.005 + d.x;
      const x = bx + Math.sin(tt) * 18, y = by + Math.cos(tt * 0.7) * 10;
      const spread = 0.4 + 0.6 * Math.abs(Math.sin(t * 0.012 + d.x));
      const pal = ['#e86aa0','#f0a83a','#6aa8f0','#f0e24a'];
      ctx.fillStyle = pal[Math.floor((d.x*3+d.y))%pal.length];
      ctx.beginPath(); ctx.ellipse(x-4, y, 4.5, 4*spread, -0.4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x+4, y, 4.5, 4*spread, 0.4, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#2a2a2a'; ctx.fillRect(x-0.6, y-3, 1.2, 6);
    } else {
      const tt = t * 0.003 + d.x * 0.1;
      const x = bx + Math.sin(tt) * 34, y = by + Math.cos(tt * 0.5) * 12;
      const flap = Math.sin(t * 0.016 + d.x) * 4;
      ctx.strokeStyle = d.type === 'seagull' ? 'rgba(250,250,255,0.95)' : 'rgba(40,40,55,0.9)';
      ctx.lineWidth = 2; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(x-9, y+flap); ctx.quadraticCurveTo(x-3, y-4, x, y); ctx.quadraticCurveTo(x+3, y-4, x+9, y+flap);
      ctx.stroke();
    }
  }
  // migrating flocks up high
  ctx.strokeStyle = 'rgba(60,60,80,0.5)'; ctx.lineWidth = 1.6;
  for (let i = 0; i < 5; i++) {
    const span = WORLD_W + 400;
    const wx = ((i * 950 + t * 0.03) % span) - 200;
    const wy = 80 + (i * 137) % 240 + ((Math.floor((i*950 + t*0.03)/span)) % 2) * 600;
    const x = wx - camX, y = wy - camY;
    if (x < -30 || x > DW + 30 || y < -30 || y > DH + 30) continue;
    const flap = Math.sin(t * 0.01 + i) * 3;
    ctx.beginPath();
    ctx.moveTo(x-7, y+flap); ctx.quadraticCurveTo(x-2, y-3, x, y); ctx.quadraticCurveTo(x+2, y-3, x+7, y+flap);
    ctx.stroke();
  }
}

// ============================================================
//  AMBIENT FOLK
// ============================================================
let ambientFolk = [];
function buildAmbientFolk() {
  ambientFolk = [];
  const palettes = ['#d98a8a','#8aa8d9','#9ed98a','#d9c98a','#c98ad9','#8ad9c9'];
  let s = 7;
  const rnd = () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
  const FOLK_COUNT = { paris: 17, cuernavaca: 7 };
  for (const key of Object.keys(REGIONS)) {
    const o = regionOrigin(key);
    const n = FOLK_COUNT[key] || 5;
    for (let i = 0; i < n; i++) {
      // Parisians stroll along the boulevard and the Seine banks
      const nearStreets = key === 'paris' && i % 3 !== 0;
      ambientFolk.push({
        bx: o.x + 150 + rnd() * (REGION_W - 300),
        by: nearStreets ? o.y + 420 + rnd() * 420 : o.y + 150 + rnd() * (REGION_H - 350),
        color: palettes[Math.floor(rnd() * palettes.length)],
        ph: rnd() * Math.PI * 2,
        range: 20 + rnd() * 40,
        spd: 0.3 + rnd() * 0.5,
      });
    }
  }
}

function drawLittlePerson(sx, sy, color, scale) {
  softShadow(sx, sy + 11*scale, 9*scale, 3*scale, 0.20);
  ctx.fillStyle = lin(sx-8*scale, sy, sx+8*scale, sy+12*scale, lighten(color,0.12), darken(color,0.14));
  ctx.beginPath();
  ctx.moveTo(sx-7*scale, sy+12*scale);
  ctx.quadraticCurveTo(sx-8*scale, sy-2*scale, sx, sy-3*scale);
  ctx.quadraticCurveTo(sx+8*scale, sy-2*scale, sx+7*scale, sy+12*scale);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#f0c8a0'; ctx.beginPath(); ctx.arc(sx, sy-6*scale, 5*scale, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5a3a1a'; ctx.beginPath(); ctx.arc(sx, sy-8*scale, 5*scale, Math.PI, 2*Math.PI); ctx.fill();
}

function drawCharacterBody(sx, sy, color, radius) {
  ctx.fillStyle = radial(sx - radius*0.3, sy - radius*0.3, radius*1.3, lighten(color, 0.22), darken(color, 0.18));
  ctx.beginPath();
  ctx.moveTo(sx - radius*0.85, sy + radius*0.7);
  ctx.quadraticCurveTo(sx - radius*1.05, sy - radius*0.6, sx, sy - radius*0.9);
  ctx.quadraticCurveTo(sx + radius*1.05, sy - radius*0.6, sx + radius*0.85, sy + radius*0.7);
  ctx.quadraticCurveTo(sx, sy + radius*1.0, sx - radius*0.85, sy + radius*0.7);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.18)'; ctx.lineWidth = 1.5; ctx.stroke();

function paintHeroine(sx, sy, t) {

  if (moving && gameState.targetX !== null) {
    const dx = gameState.targetX - gameState.playerX;

  }

  const py = sy - bob;

  softShadow(sx, sy + 17, 15, 6, 0.30);

  aura.addColorStop(0, 'rgba(245,200,66,0.26)'); aura.addColorStop(1, 'rgba(245,200,66,0)');
  ctx.fillStyle = aura; ctx.beginPath(); ctx.arc(sx, py, 30, 0, Math.PI*2); ctx.fill();

  ctx.save();

  ctx.fillStyle = radial(-4, -2, 20, '#ffe79a', '#d9a826');
  ctx.beginPath();
  ctx.moveTo(-10 + hemSway * 0.4, 14);

  ctx.quadraticCurveTo(0, -9, 6, -6);
  ctx.quadraticCurveTo(12, 2, 10 + hemSway * 0.4, 14);
  ctx.quadraticCurveTo(hemSway, 17, -10 + hemSway * 0.4, 14);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(160,120,20,0.5)'; ctx.lineWidth = 1.4; ctx.stroke();
  // hem trim
  ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 1.6;
  ctx.beginPath();
  ctx.moveTo(-9 + hemSway * 0.4, 13);
  ctx.quadraticCurveTo(hemSway, 16, 9 + hemSway * 0.4, 13);
  ctx.stroke();
  // waist sash
  ctx.strokeStyle = '#c9532f'; ctx.lineWidth = 2.4;
  ctx.beginPath(); ctx.moveTo(-7, -1); ctx.quadraticCurveTo(0, 1, 7, -1); ctx.stroke();

  // arms swinging
  ctx.strokeStyle = '#e8b088'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-8, -4); ctx.quadraticCurveTo(-11, 2 + walk * 3, -10, 6 + walk * 3.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(8, -4); ctx.quadraticCurveTo(11, 2 - walk * 3, 10, 6 - walk * 3.5); ctx.stroke();

  // head
  ctx.fillStyle = radial(-2, -16, 9, '#ffe0bc', '#eeb98c');
  ctx.beginPath(); ctx.arc(0, -14, 8, 0, Math.PI*2); ctx.fill();
  // hair: cap, side locks, low bun
  ctx.fillStyle = '#46280a';
  ctx.beginPath(); ctx.arc(0, -16, 8.4, Math.PI * 0.95, Math.PI * 2.05); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-7.5, -12, 2.4, 5.5, 0.15, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(7.5, -12, 2.4, 5.5, -0.15, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(-6, -20, 3.2, 0, Math.PI*2); ctx.fill();
  // hair shine
  ctx.strokeStyle = 'rgba(255,220,160,0.35)'; ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.arc(0, -16, 6.6, Math.PI * 1.15, Math.PI * 1.6); ctx.stroke();
  // face (looks toward walking direction)
  const look = moving ? 1.2 : 0;
  ctx.fillStyle = '#3a2010';
  ctx.beginPath(); ctx.arc(-3 + look, -13.5, 1.4, 0, Math.PI*2); ctx.arc(3 + look, -13.5, 1.4, 0, Math.PI*2); ctx.fill();
  // blush

  // little flower in hair

  for (let p = 0; p < 5; p++) { const a = p/5*Math.PI*2; ctx.beginPath(); ctx.arc(6 + Math.cos(a)*1.8, -20.5 + Math.sin(a)*1.8, 1.4, 0, Math.PI*2); ctx.fill(); }
  ctx.fillStyle = '#ffd84a'; ctx.beginPath(); ctx.arc(6, -20.5, 1, 0, Math.PI*2); ctx.fill();

// ============================================================
//  WEATHER + LIGHT (post-process)
// ============================================================
const weatherParticles = [];
function initWeather() {
  weatherParticles.length = 0;
  for (let i = 0; i < 80; i++) {
    weatherParticles.push({ x: Math.random()*DW, y: Math.random()*DH, r: 0.7+Math.random()*2.0, ph: Math.random()*Math.PI*2, sp: 0.5+Math.random()*1.6 });
  }
}
initWeather();
window.addEventListener('resize', initWeather);

function drawWeatherAndLight() {
  const region = gameState ? getCurrentRegion(gameState.playerX, gameState.playerY) : 'velizy';
  const t = Date.now();
  const day = (Math.sin(t * 0.00003) + 1) / 2;
  const golden = Math.abs(day - 0.5) * 2;

  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const sunX = DW * (0.2 + day * 0.6), sunY = DH * 0.08;
  const sun = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, Math.max(DW, DH));
  let base = `rgba(255,${Math.round(225 - golden*40)},${Math.round(170 - golden*70)},${(0.08 + golden*0.07).toFixed(3)})`;
  if (region === 'acapulco') base = `rgba(255,210,120,${(0.13 + golden*0.06).toFixed(3)})`;
  else if (region === 'paris') base = `rgba(220,225,255,0.07)`;
  else if (region === 'grenoble') base = `rgba(225,240,255,0.10)`;
  sun.addColorStop(0, base); sun.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = sun; ctx.fillRect(0, 0, DW, DH);
  ctx.restore();

  if (golden > 0.05) {
    ctx.save(); ctx.globalCompositeOperation = 'soft-light';
    ctx.fillStyle = `rgba(255,180,90,${(golden*0.18).toFixed(3)})`;
    ctx.fillRect(0, 0, DW, DH); ctx.restore();
  }

  const snow = region === 'grenoble';
  const sea = region === 'acapulco';
  for (const p of weatherParticles) {
    if (snow) {
      p.y += 0.5 + p.sp*0.5; p.x += Math.sin(t*0.001 + p.ph)*0.6;
      if (p.y > DH + 5) { p.y = -5; p.x = Math.random()*DW; }
    } else {
      p.y -= 0.10 + p.sp*0.12; p.x += Math.sin(t*0.0006 + p.ph)*0.5;
      if (p.y < -5) { p.y = DH + 5; p.x = Math.random()*DW; }
    }
    if (p.x < -5) p.x = DW+5; else if (p.x > DW+5) p.x = -5;
    const tw = 0.35 + 0.4*(0.5+0.5*Math.sin(t*0.004 + p.ph));
    const col = snow ? `rgba(255,255,255,${tw})` : (sea ? `rgba(255,250,225,${tw})` : `rgba(255,242,200,${tw*0.85})`);
    const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r*2.2);
    g.addColorStop(0, col); g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(p.x, p.y, p.r*2.2, 0, Math.PI*2); ctx.fill();
  }

  const vg = ctx.createRadialGradient(DW/2, DH/2, Math.min(DW,DH)*0.38, DW/2, DH/2, Math.max(DW,DH)*0.78);
  vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(10,8,22,0.42)');
  ctx.fillStyle = vg; ctx.fillRect(0, 0, DW, DH);
}

// ============================================================
//  MINI-MAP (HiDPI, viewport rectangle)
// ============================================================
const minimapCanvas = document.getElementById('minimap-canvas');
const mctx = minimapCanvas.getContext('2d');
const MM_W = 160, MM_H = 106;
const MM_DPR = Math.min(window.devicePixelRatio || 1, 2);
minimapCanvas.width = MM_W * MM_DPR;
minimapCanvas.height = MM_H * MM_DPR;
const MM_S = Math.min(MM_W / WORLD_W, MM_H / WORLD_H);
const MM_OX = (MM_W - WORLD_W * MM_S) / 2;
const MM_OY = (MM_H - WORLD_H * MM_S) / 2;
const mmX = (wx) => wx * MM_S + MM_OX;
const mmY = (wy) => wy * MM_S + MM_OY;
function drawMinimap() {
  mctx.setTransform(MM_DPR, 0, 0, MM_DPR, 0, 0);
  mctx.clearRect(0, 0, MM_W, MM_H);
  // countryside backdrop
  mctx.fillStyle = '#5d7245';
  mctx.fillRect(MM_OX, MM_OY, WORLD_W * MM_S, WORLD_H * MM_S);
  // roads
  mctx.strokeStyle = 'rgba(210,190,150,0.55)'; mctx.lineWidth = 1;
  for (const [a, b] of REGION_LINKS) {
    const ca = regionCenter(a), cb = regionCenter(b);
    mctx.beginPath(); mctx.moveTo(mmX(ca.x), mmY(ca.y)); mctx.lineTo(mmX(cb.x), mmY(cb.y)); mctx.stroke();
  }
  // landmasses
  for (const [key, r] of Object.entries(REGIONS)) {
    const rx = mmX(r.x), ry = mmY(r.y);
    const rw = REGION_W * MM_S, rh = REGION_H * MM_S;
    const th = THEME[key];
    const g = mctx.createLinearGradient(rx, ry, rx, ry + rh);
    g.addColorStop(0, th.gTop); g.addColorStop(1, th.gBot);
    mctx.fillStyle = g;
    mctx.beginPath();
    if (mctx.roundRect) mctx.roundRect(rx, ry, rw, rh, 6); else mctx.rect(rx, ry, rw, rh);
    mctx.fill();
    if (key === 'acapulco') {
      mctx.save(); mctx.clip();
      mctx.fillStyle = th.water; mctx.fillRect(rx + rw - 9, ry, 9, rh);
      mctx.restore();
    }
    mctx.strokeStyle = 'rgba(255,255,255,0.35)'; mctx.lineWidth = 0.6; mctx.stroke();
    mctx.fillStyle = 'rgba(255,255,255,0.85)'; mctx.font = '6px Georgia'; mctx.textAlign = 'center';
    mctx.fillText(r.name, rx + rw / 2, ry + rh / 2 + 2);
  }
  // candle NPCs
  for (const npc of npcs) {
    if (!npc.hasCandle) continue;
    mctx.fillStyle = '#f5c842';
    mctx.beginPath(); mctx.arc(mmX(npc.x), mmY(npc.y), 2, 0, Math.PI * 2); mctx.fill();
  }
  // camera viewport
  mctx.strokeStyle = 'rgba(255,255,255,0.75)'; mctx.lineWidth = 0.8;
  mctx.strokeRect(mmX(camX), mmY(camY), DW * MM_S, DH * MM_S);
  // player with pulse
  const px = mmX(gameState.playerX), py = mmY(gameState.playerY);
  mctx.fillStyle = 'rgba(255,80,80,0.4)';
  mctx.beginPath(); mctx.arc(px, py, 4 + Math.sin(Date.now() * 0.005) * 1.5, 0, Math.PI * 2); mctx.fill();
  mctx.fillStyle = '#ff4444'; mctx.beginPath(); mctx.arc(px, py, 3, 0, Math.PI * 2); mctx.fill();
  mctx.strokeStyle = '#fff'; mctx.lineWidth = 1; mctx.stroke();
  mctx.textAlign = 'left';
}

// ============================================================
//  MAIN RENDER — depth-sorted world
// ============================================================
function render() {
  const t = Date.now();
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.clearRect(0, 0, DW, DH);

  // 1. Countryside base, inter-region roads, then landmasses
  drawWilderness();
  drawInterRoads();
  drawGroundBase();

  // 2. Flat zones & ground-level decorations
  for (const b of allBuildings) {
    if (b.type !== 'park' && b.type !== 'garden' && b.type !== 'plaza') continue;
    const sx = b.x - camX, sy = b.y - camY;
    if (sx + b.w < 0 || sx > DW || sy + b.h < 0 || sy > DH) continue;
    paintFlatZone(b, sx, sy);
  }
  for (const d of allDecorations) {
    if (!FLAT_DECOS.has(d.type)) continue;
    const sx = d.x - camX, sy = d.y - camY;
    if (sx < -60 || sx > DW + 60 || sy < -60 || sy > DH + 60) continue;
    paintDecoration(d, sx, sy, t);
  }
  for (const d of mazeDecos) {
    const sx = d.x - camX, sy = d.y - camY;
    if (sx < -30 || sx > DW+30 || sy < -30 || sy > DH+30) continue;
    softShadow(sx, sy+8, 10, 3, 0.18);
    ctx.font = '22px serif'; ctx.textAlign = 'center';
    let e = '🥕'; if (d.type==='camembert') e='🧀'; else if (d.type==='cow') e='🐄'; else if (d.type==='veggie') e='🥬';
    ctx.fillText(e, sx, sy + 7); ctx.textAlign = 'left';
  }

  // 3. Cloud shadows sweep the ground
  drawCloudShadows(t);

  // 4. Depth-sorted entities: everything that stands occludes correctly
  const ents = [];
  for (const b of allBuildings) {
    if (b.type === 'park' || b.type === 'garden' || b.type === 'plaza') continue;
    const sx = b.x - camX, sy = b.y - camY;
    if (sx + b.w < 0 || sx > DW || sy + b.h < 0 || sy > DH + 40) continue;
    ents.push({ y: b.y + b.h, f: () => paintBuilding(b, sx, sy) });
  }
  for (let r = 0; r < MAZE_ROWS; r++) {
    for (let c = 0; c < MAZE_COLS; c++) {
      if (MAZE_GRID[r][c] !== 1) continue;
      const sx = MAZE_ORIGIN_X + c*MAZE_CELL - camX;
      const sy = MAZE_ORIGIN_Y + r*MAZE_CELL - camY;
      if (sx + MAZE_CELL < 0 || sx > DW || sy + MAZE_CELL < 0 || sy > DH) continue;
      ents.push({ y: MAZE_ORIGIN_Y + r*MAZE_CELL + MAZE_CELL, f: () => paintHedge(sx, sy, r, c) });
    }
  }
  for (const d of allDecorations) {
    if (FLAT_DECOS.has(d.type) || FLYING_DECOS.has(d.type)) continue;
    const sx = d.x - camX, sy = d.y - camY;
    if (sx < -60 || sx > DW + 60 || sy < -60 || sy > DH + 60) continue;
    ents.push({ y: d.y + 10, f: () => paintDecoration(d, sx, sy, t) });
  }
  for (const item of items) {
    if (item.picked) continue;
    const sx = item.x - camX, sy = item.y - camY;
    if (sx < -40 || sx > DW + 40 || sy < -40 || sy > DH + 40) continue;
    ents.push({ y: item.y + 14, f: () => paintItem(item, sx, sy, t) });
  }
  for (const f of ambientFolk) {
    const wx = f.bx + Math.sin(t * 0.0004 * f.spd + f.ph) * f.range;
    const wy = f.by + Math.cos(t * 0.0003 * f.spd + f.ph) * f.range * 0.5;
    const sx = wx - camX, sy = wy - camY;
    if (sx < -30 || sx > DW + 30 || sy < -30 || sy > DH + 30) continue;
    const bob = Math.sin(t * 0.006 + f.ph) * 1.5;
    ents.push({ y: wy + 10, f: () => drawLittlePerson(sx, sy + bob, f.color, 0.8) });
  }
  for (const npc of npcs) {
    const sx = npc.x - camX, sy = npc.y - camY;
    if (sx < -50 || sx > DW + 50 || sy < -50 || sy > DH + 50) continue;
    ents.push({ y: npc.y + 17, f: () => paintNPC(npc, sx, sy, t) });
  }
  {
    const sx = gameState.playerX - camX, sy = gameState.playerY - camY;
    ents.push({ y: gameState.playerY + 18, f: () => paintHeroine(sx, sy, t) });
  }
  if (endSequenceActive) {
    const vo = regionOrigin('velizy');
    const cx = vo.x + 350 - camX, cy = vo.y + 750 - camY;
    ents.push({ y: vo.y + 750 + 28, f: () => paintCake(cx, cy, t) });
  }
  ents.sort((a, b) => a.y - b.y);
  for (const e of ents) e.f();

  // 5. Above-world layers
  drawMoveTarget(t);
  drawChimneySmoke(t);
  drawWildlife(t);
  drawEndConfetti(t);
  drawTelePheriqueButton();
  drawClouds(t);
  drawWeatherAndLight();
  drawMinimap();
}

// ---- Game Loop ----
let running = false;

function gameLoop() {
  if (!running) return;
  update();
  render();
  updateHUD();
  requestAnimationFrame(gameLoop);
}

// ---- Start Game ----
function startGame(isNew) {
  buildWorld();
  initMazeDecos();
  buildAmbientFolk();
  initWeather();
  npcs = createNPCs();
  items = createItems();

  if (isNew) {
    gameState = newGameState();
  } else {
    gameState = newGameState(); // default
    loadGame(); // overwrite with saved
  }

  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  document.getElementById('minimap').style.display = 'block';
  updateCamera();
  updateHUD();
  running = true;

  if (isNew) {
    setTimeout(() => {
      showDialogue('Gérard', 'Joyeux anniversaire ! Tu as parlé à tout le monde ? Va voir les personnages avec une bougie dans chaque région !');
    }, 300);
  }

  gameLoop();
}

// ---- UI Events ----
document.getElementById('btn-new').addEventListener('click', () => {
  localStorage.removeItem('elViaje_save');
  startGame(true);
});

document.getElementById('btn-continue').addEventListener('click', () => {
  startGame(false);
});

document.getElementById('btn-restart').addEventListener('click', () => {
  document.getElementById('end-screen').style.display = 'none';
  localStorage.removeItem('elViaje_save');
  running = false;
  endSequenceActive = false;
  dialogueQueue = [];
  dialogueActive = false;
  document.getElementById('dialogue-box').style.display = 'none';
  document.getElementById('start-screen').style.display = 'flex';
  checkContinueButton();
});

function checkContinueButton() {
  document.getElementById('btn-continue').disabled = !hasSave();
}
checkContinueButton();
</script>
</body>
</html>
